<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Format, validate, and beautify JSON with syntax highlighting and tree view.">
    <meta name="keywords" content="json, formatter, validator, beautify, minify, developer, tool">
    <meta name="author" content="DevToolKit">
    <meta name="theme-color" content="#3b82f6">
    <title>JSON Formatter & Validator - DevToolKit</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #0f172a;
            color: #e2e8f0;
            line-height: 1.6;
            min-height: 100vh;
        }

        header {
            background-color: #1e293b;
            border-bottom: 1px solid #334155;
            padding: 1rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .header-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #3b82f6;
            text-decoration: none;
        }

        .logo:hover {
            color: #60a5fa;
        }

        nav a {
            color: #94a3b8;
            text-decoration: none;
            margin-left: 2rem;
            transition: color 0.3s;
        }

        nav a:hover {
            color: #3b82f6;
        }

        main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        .ad-banner {
            display: flex;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .ad-728x90 {
            width: 728px;
            height: 90px;
            border: 2px dashed #334155;
            background-color: #1e293b;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #64748b;
            font-size: 0.875rem;
            border-radius: 4px;
        }

        @media (max-width: 800px) {
            .ad-728x90 {
                width: 100%;
                max-width: 728px;
            }
        }

        h1 {
            color: #f1f5f9;
            margin-bottom: 0.5rem;
            font-size: 2rem;
        }

        .subtitle {
            color: #94a3b8;
            margin-bottom: 2rem;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 2rem;
        }

        .main-content {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .input-section,
        .output-section {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .section-header {
            background-color: #0f172a;
            padding: 1rem;
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .section-title {
            font-weight: 600;
            color: #f1f5f9;
        }

        .section-content {
            flex: 1;
            overflow: auto;
            position: relative;
        }

        textarea {
            width: 100%;
            min-height: 300px;
            background-color: #0f172a;
            color: #e2e8f0;
            border: none;
            padding: 1rem;
            font-family: 'Courier New', monospace;
            font-size: 0.875rem;
            resize: none;
            outline: none;
            line-height: 1.5;
        }

        textarea::placeholder {
            color: #475569;
        }

        .output-content {
            background-color: #0f172a;
            padding: 1rem;
            font-family: 'Courier New', monospace;
            font-size: 0.875rem;
            white-space: pre-wrap;
            word-wrap: break-word;
            line-height: 1.5;
            max-height: 500px;
            overflow-y: auto;
        }

        .tree-view {
            display: none;
        }

        .tree-view.visible {
            display: block;
        }

        .tree-item {
            margin-left: 1.5rem;
        }

        .tree-toggle {
            cursor: pointer;
            user-select: none;
            color: #3b82f6;
            font-weight: 600;
        }

        .tree-toggle:hover {
            color: #60a5fa;
        }

        .tree-content {
            margin-top: 0.25rem;
        }

        .tree-content.collapsed {
            display: none;
        }

        .json-key {
            color: #22d3ee;
            font-weight: 600;
        }

        .json-string {
            color: #86efac;
        }

        .json-number {
            color: #fbbf24;
        }

        .json-boolean {
            color: #f87171;
        }

        .json-null {
            color: #9ca3af;
        }

        .error-message {
            background-color: #7f1d1d;
            border: 1px solid #dc2626;
            color: #fecaca;
            padding: 1rem;
            border-radius: 4px;
            margin-bottom: 1rem;
            display: none;
        }

        .error-message.visible {
            display: block;
        }

        .error-line {
            font-weight: 600;
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .ad-300x250 {
            width: 300px;
            height: 250px;
            border: 2px dashed #334155;
            background-color: #1e293b;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #64748b;
            font-size: 0.875rem;
            border-radius: 4px;
            text-align: center;
            padding: 1rem;
        }

        .controls {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 1.5rem;
        }

        .control-group {
            margin-bottom: 1.5rem;
        }

        .control-group:last-child {
            margin-bottom: 0;
        }

        .control-label {
            display: block;
            font-weight: 600;
            color: #f1f5f9;
            margin-bottom: 0.75rem;
            font-size: 0.875rem;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        button {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.875rem;
            transition: background-color 0.3s, transform 0.1s;
        }

        button:hover {
            background-color: #2563eb;
        }

        button:active {
            transform: scale(0.98);
        }

        .indent-group {
            display: flex;
            gap: 0.5rem;
        }

        .indent-btn {
            flex: 1;
            padding: 0.5rem;
            background-color: #475569;
            font-size: 0.75rem;
        }

        .indent-btn:hover {
            background-color: #64748b;
        }

        .indent-btn.active {
            background-color: #3b82f6;
        }

        .indent-btn:hover {
            background-color: #2563eb;
        }

        .stats {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 1rem;
        }

        .stat {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.75rem;
            font-size: 0.875rem;
        }

        .stat:last-child {
            margin-bottom: 0;
        }

        .stat-label {
            color: #94a3b8;
        }

        .stat-value {
            color: #3b82f6;
            font-weight: 600;
        }

        .view-tabs {
            display: flex;
            gap: 0.5rem;
        }

        .view-tab {
            padding: 0.5rem 1rem;
            background-color: #475569;
            border: none;
            color: #e2e8f0;
            cursor: pointer;
            border-radius: 4px 4px 0 0;
            font-size: 0.875rem;
            font-weight: 600;
        }

        .view-tab:hover {
            background-color: #64748b;
        }

        .view-tab.active {
            background-color: #3b82f6;
            color: white;
        }

        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
            }

            .sidebar {
                width: 100%;
            }

            .ad-300x250 {
                width: 100%;
                max-width: 300px;
                margin: 0 auto;
            }

            .ad-728x90 {
                width: 100%;
            }

            nav a {
                margin-left: 1rem;
            }
        }

        @media (max-width: 640px) {
            h1 {
                font-size: 1.5rem;
            }

            .header-container {
                flex-direction: column;
                gap: 1rem;
            }

            main {
                padding: 1rem;
            }

            textarea {
                min-height: 250px;
            }

            .output-content {
                max-height: 400px;
            }

            .indent-group {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-container">
            <a href="index.html" class="logo">DevToolKit</a>
            <nav>
                <a href="index.html">Home</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="ad-banner">
            <div class="ad-728x90">
                Ad Space (728x90)
                <!-- REPLACE WITH ADSENSE CODE -->
            </div>
        </div>

        <h1>JSON Formatter & Validator</h1>
        <p class="subtitle">Format, validate, and beautify your JSON with syntax highlighting</p>

        <div class="container">
            <div class="main-content">
                <div class="input-section">
                    <div class="section-header">
                        <span class="section-title">JSON Input</span>
                    </div>
                    <div class="section-content">
                        <textarea id="jsonInput" placeholder="Paste your JSON here..."></textarea>
                    </div>
                </div>

                <div class="output-section">
                    <div class="section-header">
                        <span class="section-title">Output</span>
                        <div class="view-tabs">
                            <button class="view-tab active" data-view="formatted">Formatted</button>
                            <button class="view-tab" data-view="tree">Tree View</button>
                        </div>
                    </div>
                    <div class="section-content">
                        <div id="errorMessage" class="error-message"></div>
                        <div id="formattedOutput" class="output-content"></div>
                        <div id="treeView" class="tree-view"></div>
                    </div>
                </div>
            </div>

            <div class="sidebar">
                <div class="ad-300x250">
                    Ad Space (300x250)
                    <!-- REPLACE WITH ADSENSE CODE -->
                </div>

                <div class="controls">
                    <div class="control-group">
                        <label class="control-label">Indentation</label>
                        <div class="indent-group">
                            <button class="indent-btn active" data-indent="2">2 Spaces</button>
                            <button class="indent-btn" data-indent="4">4 Spaces</button>
                            <button class="indent-btn" data-indent="tab">Tab</button>
                        </div>
                    </div>

                    <div class="control-group">
                        <label class="control-label">Actions</label>
                        <div class="button-group">
                            <button id="formatBtn">Format</button>
                            <button id="minifyBtn">Minify</button>
                            <button id="copyBtn">Copy Output</button>
                            <button id="loadSampleBtn">Load Sample</button>
                            <button id="clearBtn">Clear</button>
                        </div>
                    </div>

                    <div class="stats">
                        <div class="stat">
                            <span class="stat-label">File Size</span>
                            <span class="stat-value" id="fileSize">0 B</span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">Node Count</span>
                            <span class="stat-value" id="nodeCount">0</span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">Status</span>
                            <span class="stat-value" id="status">Empty</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const jsonInput = document.getElementById('jsonInput');
        const formattedOutput = document.getElementById('formattedOutput');
        const treeView = document.getElementById('treeView');
        const errorMessage = document.getElementById('errorMessage');
        const formatBtn = document.getElementById('formatBtn');
        const minifyBtn = document.getElementById('minifyBtn');
        const copyBtn = document.getElementById('copyBtn');
        const loadSampleBtn = document.getElementById('loadSampleBtn');
        const clearBtn = document.getElementById('clearBtn');
        const fileSizeEl = document.getElementById('fileSize');
        const nodeCountEl = document.getElementById('nodeCount');
        const statusEl = document.getElementById('status');
        const viewTabs = document.querySelectorAll('.view-tab');
        const indentBtns = document.querySelectorAll('.indent-btn');

        let currentIndent = 2;
        let currentData = null;
        let currentView = 'formatted';

        const sampleJSON = {
            "users": [
                {
                    "id": 1,
                    "name": "Alice Johnson",
                    "email": "alice@example.com",
                    "role": "admin",
                    "active": true,
                    "preferences": {
                        "theme": "dark",
                        "notifications": true,
                        "language": "en"
                    }
                },
                {
                    "id": 2,
                    "name": "Bob Smith",
                    "email": "bob@example.com",
                    "role": "user",
                    "active": true,
                    "preferences": {
                        "theme": "light",
                        "notifications": false,
                        "language": "en"
                    }
                },
                {
                    "id": 3,
                    "name": "Charlie Brown",
                    "email": "charlie@example.com",
                    "role": "moderator",
                    "active": false,
                    "preferences": null
                }
            ],
            "metadata": {
                "total": 3,
                "version": "1.0",
                "timestamp": "2024-03-11T10:30:00Z"
            }
        };

        function formatBytes(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round((bytes / Math.pow(k, i)) * 100) / 100 + ' ' + sizes[i];
        }

        function countNodes(obj) {
            if (obj === null || obj === undefined) return 1;
            if (typeof obj !== 'object') return 1;
            if (Array.isArray(obj)) {
                return obj.reduce((sum, item) => sum + countNodes(item), 0);
            }
            return Object.keys(obj).reduce((sum, key) => sum + countNodes(obj[key]), 0);
        }

        function updateStats() {
            if (!currentData) {
                fileSizeEl.textContent = '0 B';
                nodeCountEl.textContent = '0';
                statusEl.textContent = 'Empty';
                return;
            }

            const json = JSON.stringify(currentData);
            fileSizeEl.textContent = formatBytes(json.length);
            nodeCountEl.textContent = countNodes(currentData);
            statusEl.textContent = 'Valid';
        }

        function parseAndValidate(jsonString) {
            try {
                errorMessage.classList.remove('visible');
                return JSON.parse(jsonString);
            } catch (error) {
                showError(error);
                return null;
            }
        }

        function showError(error) {
            const match = error.message.match(/position (\d+)/);
            const position = match ? match[1] : 'unknown';
            errorMessage.innerHTML = `<span class="error-line">Error at position ${position}:</span> ${error.message}`;
            errorMessage.classList.add('visible');
        }

        function formatJSON(data, spaces) {
            let indent = '';
            if (spaces === 'tab') {
                indent = '\t';
            } else {
                indent = ' '.repeat(spaces);
            }
            return JSON.stringify(data, null, indent);
        }

        function minifyJSON(data) {
            return JSON.stringify(data);
        }

        function buildTreeView(obj, depth = 0) {
            if (obj === null) return '<span class="json-null">null</span>';
            if (typeof obj === 'boolean') return `<span class="json-boolean">${obj}</span>`;
            if (typeof obj === 'number') return `<span class="json-number">${obj}</span>`;
            if (typeof obj === 'string') return `<span class="json-string">"${obj}"</span>`;

            if (Array.isArray(obj)) {
                if (obj.length === 0) return '<span class="json-boolean">[]</span>';

                let html = '<span class="tree-toggle">▼ [</span>';
                html += '<div class="tree-content">';
                obj.forEach((item, index) => {
                    html += '<div class="tree-item">';
                    html += '[' + index + ']: ' + buildTreeView(item, depth + 1);
                    html += '</div>';
                });
                html += '</div>';
                html += '<span class="tree-toggle">▲ ]</span>';
                return html;
            }

            if (typeof obj === 'object') {
                const keys = Object.keys(obj);
                if (keys.length === 0) return '<span class="json-boolean">{}</span>';

                let html = '<span class="tree-toggle">▼ {</span>';
                html += '<div class="tree-content">';
                keys.forEach(key => {
                    html += '<div class="tree-item">';
                    html += '<span class="json-key">"' + key + '"</span>: ' + buildTreeView(obj[key], depth + 1);
                    html += '</div>';
                });
                html += '</div>';
                html += '<span class="tree-toggle">▲ }</span>';
                return html;
            }

            return String(obj);
        }

        function displayOutput() {
            if (!currentData) return;

            if (currentView === 'formatted') {
                const indentSize = currentIndent === 'tab' ? '\t' : currentIndent;
                const formatted = formatJSON(currentData, indentSize);
                formattedOutput.textContent = formatted;
                formattedOutput.style.display = 'block';
                treeView.style.display = 'none';
            } else {
                const tree = buildTreeView(currentData);
                treeView.innerHTML = tree;
                treeView.classList.add('visible');
                formattedOutput.style.display = 'none';
                treeView.style.display = 'block';

                // Add toggle functionality to tree items
                const toggles = treeView.querySelectorAll('.tree-toggle');
                toggles.forEach((toggle, index) => {
                    toggle.addEventListener('click', function() {
                        const parent = this.parentElement;
                        const content = parent.querySelector('.tree-content');
                        if (content) {
                            content.classList.toggle('collapsed');
                            this.textContent = this.textContent.includes('▼') ? '▶' : '▼';
                        }
                    });
                });
            }

            updateStats();
        }

        function processJSON() {
            const input = jsonInput.value.trim();

            if (!input) {
                currentData = null;
                formattedOutput.textContent = '';
                treeView.innerHTML = '';
                errorMessage.classList.remove('visible');
                updateStats();
                return;
            }

            const data = parseAndValidate(input);
            if (data !== null) {
                currentData = data;
                displayOutput();
            }
        }

        function copyToClipboard() {
            let text = '';
            if (currentView === 'formatted') {
                text = formattedOutput.textContent;
            } else {
                text = treeView.textContent;
            }

            if (!text) return;

            navigator.clipboard.writeText(text).then(() => {
                const originalText = copyBtn.textContent;
                copyBtn.textContent = 'Copied!';
                setTimeout(() => {
                    copyBtn.textContent = originalText;
                }, 2000);
            });
        }

        function loadSample() {
            jsonInput.value = JSON.stringify(sampleJSON, null, 2);
            processJSON();
        }

        function clearContent() {
            jsonInput.value = '';
            currentData = null;
            formattedOutput.textContent = '';
            treeView.innerHTML = '';
            errorMessage.classList.remove('visible');
            updateStats();
        }

        // Event listeners
        formatBtn.addEventListener('click', () => {
            processJSON();
        });

        minifyBtn.addEventListener('click', () => {
            const input = jsonInput.value.trim();
            if (!input) return;

            const data = parseAndValidate(input);
            if (data !== null) {
                currentData = data;
                formattedOutput.textContent = minifyJSON(data);
                formattedOutput.style.display = 'block';
                treeView.style.display = 'none';
                updateStats();
            }
        });

        copyBtn.addEventListener('click', copyToClipboard);
        loadSampleBtn.addEventListener('click', loadSample);
        clearBtn.addEventListener('click', clearContent);

        jsonInput.addEventListener('input', processJSON);

        viewTabs.forEach(tab => {
            tab.addEventListener('click', () => {
                viewTabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentView = tab.dataset.view;
                displayOutput();
            });
        });

        indentBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                indentBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentIndent = btn.dataset.indent;
                if (currentData) {
                    displayOutput();
                }
            });
        });

        // Load sample on page load
        loadSample();
    </script>
</body>
</html>
