<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Word & Character Counter - Analyze text with real-time statistics, reading time, and keyword frequency">
    <meta name="keywords" content="word counter, character counter, text analysis, reading time, keyword frequency">
    <meta name="author" content="DevToolKit">
    <meta name="theme-color" content="#3b82f6">
    <title>Word & Character Counter - DevToolKit</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #0f172a;
            color: #e2e8f0;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-bottom: 1px solid #334155;
            padding: 1.5rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand {
            font-size: 1.8rem;
            font-weight: 700;
            color: #3b82f6;
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        .brand:hover {
            color: #60a5fa;
        }

        .ad-top {
            width: 728px;
            height: 90px;
            background: #1e293b;
            border: 2px dashed #475569;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #64748b;
            font-size: 0.9rem;
            margin: 1.5rem auto;
            border-radius: 4px;
        }

        main {
            flex: 1;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        .page-title {
            font-size: 2rem;
            margin-bottom: 1.5rem;
            color: #f1f5f9;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .main-content {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        textarea {
            width: 100%;
            min-height: 300px;
            padding: 1.5rem;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #e2e8f0;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 0.95rem;
            resize: vertical;
            transition: border-color 0.2s ease;
        }

        textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
        }

        .stat-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 1.5rem;
            text-align: center;
        }

        .stat-label {
            color: #94a3b8;
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            color: #3b82f6;
            font-size: 2rem;
            font-weight: 700;
        }

        .options-section {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 1.5rem;
        }

        .option-group {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .option-group:last-child {
            margin-bottom: 0;
        }

        .checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #3b82f6;
        }

        .option-label {
            color: #cbd5e1;
            cursor: pointer;
            font-size: 0.95rem;
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .ad-sidebar {
            width: 300px;
            height: 250px;
            background: #1e293b;
            border: 2px dashed #475569;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #64748b;
            font-size: 0.9rem;
            border-radius: 4px;
            text-align: center;
            padding: 1rem;
        }

        .keywords-section {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 1.5rem;
        }

        .keywords-section h3 {
            color: #3b82f6;
            margin-bottom: 1rem;
            font-size: 1rem;
        }

        .keyword-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 0;
            border-bottom: 1px solid #334155;
            font-size: 0.9rem;
        }

        .keyword-item:last-child {
            border-bottom: none;
        }

        .keyword-word {
            color: #cbd5e1;
            font-weight: 500;
        }

        .keyword-count {
            color: #3b82f6;
            font-weight: 700;
        }

        .button-group {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        button {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 6px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.95rem;
        }

        .btn-primary {
            background: #3b82f6;
            color: white;
        }

        .btn-primary:hover {
            background: #2563eb;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .btn-secondary {
            background: #334155;
            color: #e2e8f0;
        }

        .btn-secondary:hover {
            background: #475569;
        }

        .btn-secondary:active {
            background: #475569;
        }

        footer {
            background: #1e293b;
            border-top: 1px solid #334155;
            padding: 2rem 1.5rem;
            text-align: center;
            color: #64748b;
            font-size: 0.9rem;
            margin-top: auto;
        }

        .empty-state {
            color: #64748b;
            text-align: center;
            padding: 2rem;
        }

        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
            }

            .sidebar {
                flex-direction: row;
                align-items: flex-start;
            }

            .ad-sidebar {
                flex: 1;
                min-width: 250px;
            }

            .keywords-section {
                flex: 1;
                min-width: 250px;
            }
        }

        @media (max-width: 768px) {
            main {
                padding: 1.5rem;
            }

            .page-title {
                font-size: 1.5rem;
            }

            textarea {
                min-height: 250px;
            }

            .ad-top {
                width: 100%;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .sidebar {
                flex-direction: column;
            }

            .ad-sidebar {
                width: 100%;
                height: 250px;
            }

            .keywords-section {
                width: 100%;
            }

            .button-group {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-container">
            <a href="index.html" class="brand">DevToolKit</a>
        </div>
    </header>

    <!-- Top Ad Placeholder -->
    <div class="ad-top">
        Ad Space (728x90)
        <!-- REPLACE WITH ADSENSE CODE -->
    </div>

    <main>
        <h1 class="page-title">Word & Character Counter</h1>

        <div class="container">
            <div class="main-content">
                <textarea id="textInput" placeholder="Paste your text here to analyze..."></textarea>

                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-label">Words</div>
                        <div class="stat-value" id="wordCount">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Characters</div>
                        <div class="stat-value" id="charCount">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">No Spaces</div>
                        <div class="stat-value" id="charNoSpace">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Sentences</div>
                        <div class="stat-value" id="sentenceCount">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Paragraphs</div>
                        <div class="stat-value" id="paragraphCount">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Avg Word Length</div>
                        <div class="stat-value" id="avgWordLength">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Reading Time</div>
                        <div class="stat-value" id="readingTime">0m</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Speaking Time</div>
                        <div class="stat-value" id="speakingTime">0m</div>
                    </div>
                </div>

                <div class="options-section">
                    <div class="option-group">
                        <input type="checkbox" id="excludeStopWords" class="checkbox">
                        <label for="excludeStopWords" class="option-label">Exclude common stop words from frequency analysis</label>
                    </div>
                </div>

                <div class="button-group">
                    <button class="btn-primary" id="copyStatsBtn">Copy Stats as Text</button>
                    <button class="btn-secondary" id="clearBtn">Clear All</button>
                </div>
            </div>

            <div class="sidebar">
                <div class="ad-sidebar">
                    Ad Space (300x250)
                    <!-- REPLACE WITH ADSENSE CODE -->
                </div>

                <div class="keywords-section">
                    <h3>Top 10 Keywords</h3>
                    <div id="keywordsList" class="empty-state">No text yet</div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 DevToolKit. All rights reserved.</p>
    </footer>

    <script>
        const textInput = document.getElementById('textInput');
        const excludeStopWordsCheckbox = document.getElementById('excludeStopWords');
        const copyStatsBtn = document.getElementById('copyStatsBtn');
        const clearBtn = document.getElementById('clearBtn');

        const stopWords = new Set([
            'a', 'about', 'above', 'after', 'again', 'against', 'all', 'am', 'an', 'and', 'any', 'are', 'aren\'t',
            'as', 'at', 'be', 'because', 'been', 'before', 'being', 'below', 'between', 'both', 'but', 'by', 'can\'t',
            'cannot', 'could', 'couldn\'t', 'did', 'didn\'t', 'do', 'does', 'doesn\'t', 'doing', 'don\'t', 'down',
            'during', 'each', 'few', 'for', 'from', 'further', 'had', 'hadn\'t', 'has', 'hasn\'t', 'have', 'haven\'t',
            'having', 'he', 'he\'d', 'he\'ll', 'he\'s', 'her', 'here', 'here\'s', 'hers', 'herself', 'him', 'himself',
            'his', 'how', 'how\'s', 'i', 'i\'d', 'i\'ll', 'i\'m', 'i\'ve', 'if', 'in', 'into', 'is', 'isn\'t', 'it',
            'it\'s', 'its', 'itself', 'just', 'k', 'me', 'might', 'more', 'most', 'mustn\'t', 'my', 'myself', 'no',
            'nor', 'not', 'of', 'off', 'on', 'once', 'only', 'or', 'other', 'ought', 'our', 'ours', 'ourselves',
            'out', 'over', 'own', 'same', 'shan\'t', 'she', 'she\'d', 'she\'ll', 'she\'s', 'should', 'shouldn\'t',
            'so', 'some', 'such', 'than', 'that', 'that\'s', 'the', 'their', 'theirs', 'them', 'themselves', 'then',
            'there', 'there\'s', 'these', 'they', 'they\'d', 'they\'ll', 'they\'re', 'they\'ve', 'this', 'those',
            'through', 'to', 'too', 'under', 'until', 'up', 'very', 'was', 'wasn\'t', 'we', 'we\'d', 'we\'ll', 'we\'re',
            'we\'ve', 'were', 'weren\'t', 'what', 'what\'s', 'when', 'when\'s', 'where', 'where\'s', 'which', 'while',
            'who', 'who\'s', 'whom', 'why', 'why\'s', 'with', 'won\'t', 'would', 'wouldn\'t', 'you', 'you\'d',
            'you\'ll', 'you\'re', 'you\'ve', 'your', 'yours', 'yourself', 'yourselves'
        ]);

        function updateStats() {
            const text = textInput.value;

            // Basic counts
            const charCount = text.length;
            const charNoSpace = text.replace(/\s/g, '').length;
            const trimmedText = text.trim();
            const wordArray = trimmedText.length > 0 ? trimmedText.split(/\s+/) : [];
            const wordCount = wordArray.length && trimmedText.length > 0 ? wordArray.length : 0;

            // Sentences
            const sentences = trimmedText.split(/[.!?]+/).filter(s => s.trim().length > 0);
            const sentenceCount = sentences.length > 0 && trimmedText.length > 0 ? sentences.length : 0;

            // Paragraphs
            const paragraphs = trimmedText.split(/\n\n+/).filter(p => p.trim().length > 0);
            const paragraphCount = paragraphs.length > 0 && trimmedText.length > 0 ? paragraphs.length : 0;

            // Average word length
            const avgWordLength = wordCount > 0 ? (charNoSpace / wordCount).toFixed(1) : 0;

            // Reading time (200 words per minute)
            const readingTimeMinutes = Math.max(1, Math.round(wordCount / 200));

            // Speaking time (150 words per minute)
            const speakingTimeMinutes = Math.max(1, Math.round(wordCount / 150));

            // Update display
            document.getElementById('wordCount').textContent = wordCount;
            document.getElementById('charCount').textContent = charCount;
            document.getElementById('charNoSpace').textContent = charNoSpace;
            document.getElementById('sentenceCount').textContent = sentenceCount;
            document.getElementById('paragraphCount').textContent = paragraphCount;
            document.getElementById('avgWordLength').textContent = avgWordLength;
            document.getElementById('readingTime').textContent = `${readingTimeMinutes}m`;
            document.getElementById('speakingTime').textContent = `${speakingTimeMinutes}m`;

            // Update keywords
            updateKeywords(wordArray);
        }

        function updateKeywords(wordArray) {
            const keywordsList = document.getElementById('keywordsList');

            if (wordArray.length === 0) {
                keywordsList.innerHTML = '<div class="empty-state">No text yet</div>';
                return;
            }

            const wordFreq = {};
            wordArray.forEach(word => {
                const cleaned = word.toLowerCase().replace(/[^a-z0-9]/g, '');
                if (cleaned.length > 0) {
                    const shouldExclude = excludeStopWordsCheckbox.checked && stopWords.has(cleaned);
                    if (!shouldExclude) {
                        wordFreq[cleaned] = (wordFreq[cleaned] || 0) + 1;
                    }
                }
            });

            const sortedKeywords = Object.entries(wordFreq)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 10);

            if (sortedKeywords.length === 0) {
                keywordsList.innerHTML = '<div class="empty-state">No keywords found</div>';
                return;
            }

            keywordsList.innerHTML = sortedKeywords
                .map(([word, count]) => `
                    <div class="keyword-item">
                        <span class="keyword-word">${escapeHtml(word)}</span>
                        <span class="keyword-count">${count}</span>
                    </div>
                `)
                .join('');
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        textInput.addEventListener('input', updateStats);
        excludeStopWordsCheckbox.addEventListener('change', updateStats);

        copyStatsBtn.addEventListener('click', () => {
            const stats = `
Word Counter Statistics
=======================
Words: ${document.getElementById('wordCount').textContent}
Characters: ${document.getElementById('charCount').textContent}
Characters (no spaces): ${document.getElementById('charNoSpace').textContent}
Sentences: ${document.getElementById('sentenceCount').textContent}
Paragraphs: ${document.getElementById('paragraphCount').textContent}
Average Word Length: ${document.getElementById('avgWordLength').textContent}
Reading Time: ${document.getElementById('readingTime').textContent}
Speaking Time: ${document.getElementById('speakingTime').textContent}
            `.trim();

            navigator.clipboard.writeText(stats).then(() => {
                const originalText = copyStatsBtn.textContent;
                copyStatsBtn.textContent = 'Copied!';
                setTimeout(() => {
                    copyStatsBtn.textContent = originalText;
                }, 2000);
            });
        });

        clearBtn.addEventListener('click', () => {
            textInput.value = '';
            updateStats();
            textInput.focus();
        });
    </script>
</body>
</html>
